web:
  auth:
    email: admin@example.com
    password: admin123
    strategy: login_then_register
  urls:
    - url: http://localhost:8082/console/enterprise/1/space/1/tag/tag/create
      description: 新建标签页面 — 边界校验

验收场景:

- 新建标签边界校验
  - case: 不输入任何字符时提示长度错误
    - pc: 用户已登录并进入新建标签页面
      - ts: 1. 不在标签名称输入框中输入任何内容 2. 点击输入框外部触发blur校验 3. 观察错误提示
        - ✅ 显示错误提示"标签名称必须为 1～100 字符长度"
        - ❌ 无错误提示或提示内容仍显示旧的50字符限制

  - case: 输入101个字符时输入框阻止输入
    - pc: 用户已登录并进入新建标签页面
      - ts: 1. 在标签名称输入框中连续输入字符 2. 观察输入到第101个字符时的行为
        - ✅ 第101个字符被输入框maxLength属性阻止，输入框内保持100个字符
        - ❌ 输入框接受了第101个字符

  - case: 粘贴超过100字符的内容自动截断
    - pc: 用户已登录并进入新建标签页面
      - ts: 1. 复制一段150个字符的合法内容 2. 粘贴到标签名称输入框中 3. 观察输入框内容
        - ✅ 内容被浏览器原生maxLength截断至100个字符，保留前100个字符
        - ❌ 输入框接受了超过100个字符的内容
