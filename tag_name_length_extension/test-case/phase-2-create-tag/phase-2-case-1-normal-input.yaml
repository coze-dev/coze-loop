web:
  auth:
    email: admin@example.com
    password: admin123
    strategy: login_then_register
  urls:
    - url: http://localhost:8082/console/enterprise/1/space/1/tag/tag/create
      description: 新建标签页面 — 正常输入验证

验收场景:

- 新建标签正常输入
  - case: 输入1个字符的标签名称可正常创建
    - pc: 用户已登录并进入新建标签页面
      - ts: 1. 在标签名称输入框中输入1个合法字符（如"a"） 2. 选择标签类型 3. 点击提交按钮
        - ✅ 校验通过，标签创建成功
        - ❌ 提示长度错误或创建失败

  - case: 输入50个字符的标签名称可正常创建
    - pc: 用户已登录并进入新建标签页面
      - ts: 1. 在标签名称输入框中输入50个合法字符 2. 选择标签类型 3. 点击提交按钮
        - ✅ 校验通过，标签创建成功
        - ❌ 提示长度错误或创建失败

  - case: 输入100个字符的标签名称可正常创建
    - pc: 用户已登录并进入新建标签页面
      - ts: 1. 在标签名称输入框中输入100个合法字符 2. 选择标签类型 3. 点击提交按钮
        - ✅ 校验通过，标签创建成功
        - ❌ 提示长度错误或创建失败

  - case: 输入中英文数字下划线混合名称可正常创建
    - pc: 用户已登录并进入新建标签页面
      - ts: 1. 在标签名称输入框中输入"测试标签_Test_Tag_123"（混合中英文数字下划线） 2. 选择标签类型 3. 点击提交按钮
        - ✅ 校验通过，标签创建成功
        - ❌ 提示字符不合法或创建失败
