web:
  auth:
    email: admin@example.com
    password: admin123
    strategy: login_then_register
  urls:
    - url: http://localhost:8082/console/enterprise/1/space/1/tag/tag/create
      description: 新建标签页面 — 验证常量 MAX_TAG_NAME_LENGTH 已生效为 100

验收场景:

- 常量层变更验证
  - case: 验证标签名称输入框允许输入100个字符
    - pc: 用户已登录并进入新建标签页面
      - ts: 1. 定位标签名称输入框 2. 在输入框中输入100个合法字符（如100个字母a） 3. 观察输入框是否接受全部100个字符
        - ✅ 输入框成功接受100个字符，无截断或报错
        - ❌ 输入在第50或51个字符时被截断，说明常量未正确修改

  - case: 验证标签名称输入框阻止第101个字符
    - pc: 用户已登录并进入新建标签页面
      - ts: 1. 在标签名称输入框中输入100个合法字符 2. 尝试继续输入第101个字符
        - ✅ 第101个字符被阻止，输入框内仍为100个字符
        - ❌ 输入框接受了超过100个字符

  - case: 验证 MAX_TAG_LENGTH 未被误改（标签选项数量上限仍为50）
    - pc: 用户已登录并进入新建标签页面，选择分类型标签
      - ts: 1. 选择标签类型为「分类型」 2. 观察标签选项值的添加上限是否仍为50
        - ✅ 标签选项值数量上限保持50不变
        - ❌ 标签选项值数量上限发生变化，说明 MAX_TAG_LENGTH 被误改
