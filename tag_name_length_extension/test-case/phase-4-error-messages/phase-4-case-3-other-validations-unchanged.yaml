web:
  auth:
    email: admin@example.com
    password: admin123
    strategy: login_then_register
  urls:
    - url: http://localhost:8082/console/enterprise/1/space/1/tag/tag/create
      description: 新建标签页面 — 其他校验提示不受影响

验收场景:

- 其他校验提示不受影响
  - case: 特殊字符校验提示不变
    - pc: 用户已登录并进入新建标签页面
      - ts: 1. 在标签名称输入框中输入"test@tag" 2. 点击输入框外部触发blur校验
        - ✅ 显示"标签名称仅支持输入中文、英文、数字和下划线"，提示内容未被本次修改影响
        - ❌ 提示内容发生了非预期变化

  - case: 唯一性校验提示不变
    - pc: 用户已登录并进入新建标签页面，空间内已有标签
      - ts: 1. 在标签名称输入框中输入与已有标签相同的名称 2. 点击输入框外部触发blur校验
        - ✅ 显示"同空间内标签名称不允许重复"，提示内容未被本次修改影响
        - ❌ 提示内容发生了非预期变化

  - case: 分类型选项值为空时校验提示不变
    - pc: 用户已登录并进入新建标签页面，选择标签类型为「分类型」
      - ts: 1. 添加一个选项值 2. 不输入选项值名称 3. 触发校验
        - ✅ 显示"标签值不能为空"，提示内容未被本次修改影响
        - ❌ 提示内容发生了非预期变化

  - case: 分类型选项值重复时校验提示不变
    - pc: 用户已登录并进入新建标签页面，选择标签类型为「分类型」
      - ts: 1. 添加两个选项值 2. 输入相同的名称 3. 触发校验
        - ✅ 显示"一个标签内的标签值不允许重复"，提示内容未被本次修改影响
        - ❌ 提示内容发生了非预期变化
