web:
  auth:
    email: admin@example.com
    password: admin123
    strategy: login_then_register
  urls:
    - url: http://localhost:8082/console/enterprise/1/space/1/tag/tag/create
      description: 新建标签页面 — 中文环境下长度校验错误提示

验收场景:

- 中文环境长度校验提示
  - case: 空标签名称提示包含100字符限制（中文）
    - pc: 用户已登录并进入新建标签页面，语言设置为中文
      - ts: 1. 点击标签名称输入框获取焦点 2. 不输入任何内容 3. 点击输入框外部触发blur校验 4. 观察错误提示文案
        - ✅ 错误提示显示"标签名称必须为 1～100 字符长度"
        - ❌ 错误提示仍显示旧文案"标签名称必须为 1～50 字符长度"

  - case: 输入后清空标签名称提示包含100字符限制（中文）
    - pc: 用户已登录并进入新建标签页面，语言设置为中文
      - ts: 1. 在标签名称输入框中输入一些内容 2. 全选并删除所有内容 3. 点击输入框外部触发blur校验
        - ✅ 错误提示显示"标签名称必须为 1～100 字符长度"
        - ❌ 错误提示仍显示旧文案或无提示
