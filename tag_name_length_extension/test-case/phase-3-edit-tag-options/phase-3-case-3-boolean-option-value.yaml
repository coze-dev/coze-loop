web:
  auth:
    email: admin@example.com
    password: admin123
    strategy: login_then_register
  urls:
    - url: http://localhost:8082/console/enterprise/1/space/1/tag/tag/create
      description: 新建标签页面 — 布尔型标签选项值名称长度验证

验收场景:

- 布尔型标签选项值名称长度
  - case: 布尔型选项一名称输入100字符校验通过
    - pc: 用户已登录并进入新建标签页面，选择标签类型为「布尔型」
      - ts: 1. 选择标签类型为「布尔型」 2. 在选项一名称输入框中输入100个合法字符 3. 观察校验状态
        - ✅ 校验通过，输入框接受全部100个字符
        - ❌ 输入在旧上限50字符处被截断

  - case: 布尔型选项二名称输入100字符校验通过
    - pc: 用户已登录并进入新建标签页面，选择标签类型为「布尔型」
      - ts: 1. 选择标签类型为「布尔型」 2. 在选项二名称输入框中输入100个合法字符 3. 观察校验状态
        - ✅ 校验通过，输入框接受全部100个字符
        - ❌ 输入在旧上限50字符处被截断

  - case: 布尔型选项一名称超过100字符被阻止
    - pc: 用户已登录并进入新建标签页面，选择标签类型为「布尔型」
      - ts: 1. 选择标签类型为「布尔型」 2. 在选项一名称输入框中尝试输入101个字符
        - ✅ 第101个字符被输入框maxLength阻止
        - ❌ 输入框接受超过100个字符

  - case: 布尔型选项二名称超过100字符被阻止
    - pc: 用户已登录并进入新建标签页面，选择标签类型为「布尔型」
      - ts: 1. 选择标签类型为「布尔型」 2. 在选项二名称输入框中尝试输入101个字符
        - ✅ 第101个字符被输入框maxLength阻止
        - ❌ 输入框接受超过100个字符
