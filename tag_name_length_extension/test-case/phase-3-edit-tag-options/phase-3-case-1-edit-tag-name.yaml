web:
  auth:
    email: admin@example.com
    password: admin123
    strategy: login_then_register
  urls:
    - url: http://localhost:8082/console/enterprise/1/space/1/tag/tag
      description: 标签列表页面 — 进入编辑标签

验收场景:

- 编辑标签名称
  - case: 将已有标签名称修改为100字符以内可正常保存
    - pc: 用户已登录并进入标签列表页面，已存在至少一个标签
      - ts: 1. 点击某个已有标签进入编辑页面 2. 将标签名称修改为80个合法字符 3. 点击保存按钮
        - ✅ 校验通过，标签更新成功
        - ❌ 修改后校验失败或保存失败

  - case: 将已有标签名称修改为正好100个字符可正常保存
    - pc: 用户已登录并进入已有标签的编辑页面
      - ts: 1. 清空标签名称输入框 2. 输入100个合法字符 3. 点击保存按钮
        - ✅ 校验通过，标签更新成功
        - ❌ 输入被截断或保存失败

  - case: 保持原名称不变时校验通过
    - pc: 用户已登录并进入已有标签的编辑页面
      - ts: 1. 不修改标签名称 2. 观察保存按钮状态
        - ✅ 校验通过，保存按钮因无变更而不高亮（或提示无修改）
        - ❌ 出现校验错误

  - case: 编辑时清空名称提示长度错误
    - pc: 用户已登录并进入已有标签的编辑页面
      - ts: 1. 清空标签名称输入框 2. 点击输入框外部触发blur校验
        - ✅ 显示错误提示"标签名称必须为 1～100 字符长度"
        - ❌ 无错误提示

  - case: 编辑时输入101字符被阻止
    - pc: 用户已登录并进入已有标签的编辑页面
      - ts: 1. 清空标签名称 2. 尝试输入101个字符
        - ✅ 输入框在100个字符处阻止继续输入
        - ❌ 输入框接受超过100个字符
