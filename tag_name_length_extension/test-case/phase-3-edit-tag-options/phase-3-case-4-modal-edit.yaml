web:
  auth:
    email: admin@example.com
    password: admin123
    strategy: login_then_register
  urls:
    - url: http://localhost:8082/console/enterprise/1/space/1/tag/tag
      description: 标签列表页面 — 弹窗模式编辑标签

验收场景:

- 弹窗模式编辑标签
  - case: 弹窗编辑标签名称修改为100字符可成功保存
    - pc: 用户已登录并进入标签列表页面，已存在至少一个标签
      - ts: 1. 在标签列表中点击编辑按钮打开弹窗 2. 将标签名称修改为100个合法字符 3. 点击确认按钮保存
        - ✅ 标签更新成功，弹窗关闭，列表显示更新后的标签
        - ❌ 输入被截断或保存失败

  - case: 编辑弹窗中修改后未保存直接关闭弹出拦截提示
    - pc: 用户已登录并进入标签列表页面，已打开编辑标签弹窗
      - ts: 1. 修改标签名称为不同的值 2. 不点击保存，直接尝试关闭弹窗
        - ✅ 弹出离开拦截提示"修改还未提交，退出后将不会保存此次修改。"
        - ❌ 弹窗直接关闭，修改丢失且无提示
