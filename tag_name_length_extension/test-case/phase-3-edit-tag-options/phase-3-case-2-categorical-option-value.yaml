web:
  auth:
    email: admin@example.com
    password: admin123
    strategy: login_then_register
  urls:
    - url: http://localhost:8082/console/enterprise/1/space/1/tag/tag/create
      description: 新建标签页面 — 分类型标签选项值名称长度验证

验收场景:

- 分类型标签选项值名称长度
  - case: 分类型选项值名称输入1到100字符校验通过
    - pc: 用户已登录并进入新建标签页面，选择标签类型为「分类型」
      - ts: 1. 选择标签类型为「分类型」 2. 在选项值名称输入框中输入80个合法字符 3. 观察校验状态
        - ✅ 校验通过，允许添加该选项值
        - ❌ 提示长度超限或输入被截断

  - case: 分类型选项值名称输入100个字符校验通过
    - pc: 用户已登录并进入新建标签页面，选择标签类型为「分类型」
      - ts: 1. 选择标签类型为「分类型」 2. 在选项值名称输入框中输入正好100个合法字符 3. 观察校验状态
        - ✅ 校验通过，输入框接受全部100个字符
        - ❌ 输入在旧上限50字符处被截断

  - case: 分类型选项值名称超过100字符被阻止
    - pc: 用户已登录并进入新建标签页面，选择标签类型为「分类型」
      - ts: 1. 选择标签类型为「分类型」 2. 在选项值名称输入框中尝试输入101个字符
        - ✅ 第101个字符被输入框maxLength阻止
        - ❌ 输入框接受超过100个字符

  - case: 编辑已有分类型标签修改选项值名称为100字符
    - pc: 用户已登录并进入已有分类型标签的编辑页面
      - ts: 1. 修改某个选项值名称为100个合法字符 2. 点击保存
        - ✅ 校验通过，选项值更新成功
        - ❌ 输入被截断或保存失败

  - case: 两个选项值名称相同时提示重复
    - pc: 用户已登录并进入新建标签页面，选择标签类型为「分类型」
      - ts: 1. 添加两个选项值 2. 将两个选项值的名称输入相同的80个字符内容 3. 触发校验
        - ✅ 提示"一个标签内的标签值不允许重复"
        - ❌ 校验通过允许重复命名
